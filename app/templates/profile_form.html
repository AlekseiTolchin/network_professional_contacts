{% extends "base.html" %}
{% block title %}{{ 'Редактирование' if profile else 'Добавление' }} профиля — ProNetwork{% endblock %}
{% block content %}
<h2>{{ 'Редактирование' if profile else 'Добавление' }} профиля</h2>
{% if error %}
<div class="alert alert-danger">{{ error }}</div>
{% endif %}
<form method="post" class="col-md-6">
    <div class="mb-3">
        <label class="form-label">Имя профиля</label>
        <input type="text" name="profile_name" class="form-control" value="{{ profile.profile_name if profile else '' }}" required>
    </div>
    <div class="mb-3">
        <label class="form-label">Должность</label>
        <input type="text" name="job_title" class="form-control" value="{{ profile.job_title if profile else '' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Компания</label>
        <input type="text" name="company_name" class="form-control" value="{{ profile.company_name if profile else '' }}">
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="/profiles" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
